# version: '3.9' (obsolete)

services:
  postgres:
    image: postgres:16-alpine
    container_name: eberle_eats_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eberle
      POSTGRES_PASSWORD: eberle123
      POSTGRES_DB: eberle_eats
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: eberle_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: eberle_evolution_api
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=eberle_secret
      - AUTH_JWTPRIVATEKEY=eberle_jwt_secret
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://eberle:eberle123@postgres:5432/eberle_eats?schema=public
      - DATABASE_PROVIDER=postgresql
      - DELAY_MESSAGES=true
      - QRCODE_LIMIT=30
    ports:
      - '8080:8080'
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
  evolution_instances:
